name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Setup wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: wash-v2.0.0-rc.8

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build component
        run: wash build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-component
          path: target/wasm32-wasip2/release/*.wasm
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Setup wash
        uses: wasmCloud/setup-wash-action@main
        with:
          wash-version: wash-v2.0.0-rc.8

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-component
          path: target/wasm32-wasip2/release

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GitHub Container Registry
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          WASM_FILE=$(find target/wasm32-wasip2/release -name "*.wasm" | head -1)

          wash oci push ghcr.io/${{ github.repository }}:${VERSION} "${WASM_FILE}"
          wash oci push ghcr.io/${{ github.repository }}:latest "${WASM_FILE}"
